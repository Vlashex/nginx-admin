name: Daemon Debian Release

on:
  push:
    tags:
      - "daemon-v*"
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-deb:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: daemon
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-deb
        run: cargo install cargo-deb --locked

      - name: Prepare maintainer scripts
        run: chmod +x packaging/debian/postinst packaging/debian/prerm packaging/debian/postrm

      - name: Build daemon
        run: cargo build --release

      - name: Build deb package
        run: cargo deb --no-build

      - name: Upload deb artifact
        uses: actions/upload-artifact@v4
        with:
          name: nginx-admin-deb
          path: daemon/target/debian/*.deb

      - name: Publish release assets
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: daemon/target/debian/*.deb
          generate_release_notes: true
