name: Daemon Debian Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version in format X.Y.Z"
        required: true
        type: string
      prerelease:
        description: "Create as pre-release"
        required: true
        default: true
        type: boolean

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: daemon

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate version format
        run: |
          VERSION="${{ github.event.inputs.version }}"
          if ! [[ "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Invalid version format. Expected X.Y.Z"
            exit 1
          fi
          echo "VERSION=$VERSION" >> $GITHUB_ENV

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-deb
        run: cargo install cargo-deb --locked

      - name: Update Cargo.toml version
        run: |
          sed -i "s/^version = \".*\"/version = \"${VERSION}\"/" Cargo.toml

      - name: Commit version bump
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add Cargo.toml
          git commit -m "Release daemon v${VERSION}" || echo "No changes"

      - name: Create tag
        run: |
          git tag daemon-v${VERSION}
          git push origin daemon-v${VERSION}

      - name: Prepare maintainer scripts
        run: |
          find packaging/debian -type f -exec dos2unix {} +
          chmod +x packaging/debian/postinst packaging/debian/prerm packaging/debian/postrm

      - name: Build daemon
        run: cargo build --release

      - name: Build deb package
        run: cargo deb --no-build

      - name: Rename deb to strict format
        run: |
          mv target/debian/*.deb target/debian/nginx-admin_${VERSION}_amd64.deb

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: daemon-v${{ env.VERSION }}
          name: daemon-v${{ env.VERSION }}
          files: daemon/target/debian/nginx-admin_${{ env.VERSION }}_amd64.deb
          prerelease: ${{ github.event.inputs.prerelease }}
          generate_release_notes: true