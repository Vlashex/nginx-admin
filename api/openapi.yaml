openapi: 3.0.3
info:
  title: nginx-admin Control Plane API
  version: 1.0.0
  description: |
    API управления декларативным состоянием NGINX в daemon-driven модели.
    Клиент записывает desired state, а daemon асинхронно приводит runtime к новой revision.
servers:
  - url: https://nginx-admin.local
paths:
  /v1/state:
    get:
      summary: Получить текущее desired state
      operationId: getState
      responses:
        "200":
          description: Текущее состояние
          headers:
            ETag:
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StateDocument"
    put:
      summary: Обновить desired state
      operationId: putState
      parameters:
        - in: header
          name: If-Match
          required: true
          schema:
            type: string
          description: Текущая revision (optimistic concurrency)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/StateDocument"
      responses:
        "200":
          description: State обновлён
          headers:
            ETag:
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StateDocument"
        "409":
          description: Revision conflict
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /v1/runtime/status:
    get:
      summary: Получить статус сходимости desired и runtime
      operationId: getRuntimeStatus
      responses:
        "200":
          description: Текущий статус daemon convergence
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RuntimeStatus"

  /v1/backups:
    get:
      summary: Список доступных backup snapshot
      operationId: listBackups
      responses:
        "200":
          description: Список snapshot
          content:
            application/json:
              schema:
                type: object
                required:
                  - items
                properties:
                  items:
                    type: array
                    items:
                      $ref: "#/components/schemas/Backup"

  /v1/backups/{backupId}/rollback:
    post:
      summary: Выполнить rollback к backup snapshot
      operationId: rollbackBackup
      parameters:
        - in: path
          name: backupId
          required: true
          schema:
            type: string
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              properties:
                reason:
                  type: string
      responses:
        "202":
          description: Rollback принят в обработку daemon
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CommandAccepted"

  /v1/reconcile:
    post:
      summary: Принудительно запустить reconcile
      operationId: triggerReconcile
      responses:
        "202":
          description: Reconcile поставлен в очередь daemon
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CommandAccepted"

  /v1/mode:
    get:
      summary: Получить текущий режим управления
      operationId: getMode
      responses:
        "200":
          description: Режим
          content:
            application/json:
              schema:
                type: object
                required:
                  - mode
                properties:
                  mode:
                    $ref: "#/components/schemas/OperationalMode"
    put:
      summary: Переключить режим управления
      operationId: setMode
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              required:
                - mode
              properties:
                mode:
                  $ref: "#/components/schemas/OperationalMode"
                confirmTakeover:
                  type: boolean
                  description: Обязательный флаг для перехода в FULL_CONTROL
      responses:
        "202":
          description: Переключение режима принято daemon
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CommandAccepted"

components:
  schemas:
    OperationalMode:
      type: string
      enum: [OVERLAY, FULL_CONTROL]

    RuntimeSyncState:
      type: string
      enum: [IN_SYNC, PENDING_APPLY, APPLYING, OUT_OF_SYNC, DEGRADED]

    RuntimeStatus:
      type: object
      additionalProperties: false
      required:
        - desiredRevision
        - observedRevision
        - syncState
      properties:
        desiredRevision:
          type: integer
          minimum: 0
        observedRevision:
          type: integer
          minimum: 0
        syncState:
          $ref: "#/components/schemas/RuntimeSyncState"
        lastError:
          type: string
        updatedAt:
          type: string
          format: date-time

    StateDocument:
      type: object
      additionalProperties: false
      required:
        - schemaVersion
        - revision
        - updatedAt
        - updatedBy
        - servers
      properties:
        schemaVersion:
          type: string
          example: "1.0.0"
        revision:
          type: integer
          minimum: 0
          example: 42
        updatedAt:
          type: string
          format: date-time
        updatedBy:
          type: string
        servers:
          type: array
          items:
            $ref: "#/components/schemas/Server"

    Server:
      type: object
      additionalProperties: false
      required:
        - id
        - serverName
        - listen
        - routes
        - enabled
      properties:
        id:
          type: string
        serverName:
          type: string
        listen:
          type: array
          items:
            $ref: "#/components/schemas/Listen"
        routes:
          type: array
          items:
            $ref: "#/components/schemas/Route"
        enabled:
          type: boolean

    Listen:
      type: object
      additionalProperties: false
      required:
        - port
        - ssl
      properties:
        port:
          type: integer
          minimum: 1
          maximum: 65535
        ssl:
          type: boolean

    Route:
      type: object
      additionalProperties: false
      required:
        - id
        - path
        - action
        - enabled
      properties:
        id:
          type: string
        path:
          type: string
        matchType:
          type: string
          enum: [prefix, exact, regex]
        action:
          $ref: "#/components/schemas/RouteAction"
        enabled:
          type: boolean

    RouteAction:
      oneOf:
        - $ref: "#/components/schemas/ProxyPassAction"
        - $ref: "#/components/schemas/StaticAction"
        - $ref: "#/components/schemas/RedirectAction"

    ProxyPassAction:
      type: object
      additionalProperties: false
      required: [type, target]
      properties:
        type:
          type: string
          enum: [proxy_pass]
        target:
          type: string

    StaticAction:
      type: object
      additionalProperties: false
      required: [type, root]
      properties:
        type:
          type: string
          enum: [static]
        root:
          type: string
        index:
          type: string

    RedirectAction:
      type: object
      additionalProperties: false
      required: [type, url, code]
      properties:
        type:
          type: string
          enum: [redirect]
        url:
          type: string
        code:
          type: integer
          enum: [301, 302, 307, 308]

    Backup:
      type: object
      additionalProperties: false
      required:
        - backupId
        - createdAt
        - path
        - stateRevision
      properties:
        backupId:
          type: string
        createdAt:
          type: string
          format: date-time
        path:
          type: string
        stateRevision:
          type: integer
        checksumSha256:
          type: string

    CommandAccepted:
      type: object
      required:
        - commandId
        - status
      properties:
        commandId:
          type: string
        status:
          type: string
          enum: [ACCEPTED]

    ErrorResponse:
      type: object
      required:
        - code
        - message
      properties:
        code:
          type: string
        message:
          type: string
        details:
          type: object
          additionalProperties: true
